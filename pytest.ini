# PyTest configuration file for test runner settings.

[pytest]
minversion = 7.0
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
testpaths = 
    tests
python_files = 
    test_*.py
    *_test.py
python_classes = 
    Test*
python_functions = 
    test_*
markers = 
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    slow: marks tests as slow running
    network: marks tests that require network access
    api: marks tests that use external APIs
    chaos: marks chaos engineering tests (fault injection)
    soak: marks soak tests (long-running stability)
    property: marks property-based tests (hypothesis)
filterwarnings = 
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
asyncio_mode = auto
