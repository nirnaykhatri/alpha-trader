# Pre-commit hooks for Alpha Trader
# See https://pre-commit.com for more information

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key

  # Python formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.9

  # Python linting
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=88', '--extend-ignore=E203,W503']

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5.0
          - types-toml
        args: ['--ignore-missing-imports']

  # TypeScript/JavaScript type generation
  - repo: local
    hooks:
      - id: generate-typescript-types
        name: Generate TypeScript types from Python
        entry: python scripts/generate_typescript_types.py
        language: python
        files: ^src/domain/.*\.py$
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2.5.0
        description: >
          Regenerates TypeScript types from Python Pydantic models
          when domain models change. Ensures frontend types stay in
          sync with backend.

  # Frontend checks
  - repo: local
    hooks:
      - id: frontend-typecheck
        name: TypeScript type check
        entry: npm run type-check --prefix trading-terminal
        language: system
        files: ^trading-terminal/.*\.(ts|tsx)$
        pass_filenames: false

# Configuration for specific hooks
ci:
  autofix_prs: true
  autoupdate_schedule: weekly
