# Trading Bot Configuration - Local Only Mode
# This configuration disables ngrok for local-only operation

# API Configuration  
api:
  alpaca:
    api_key: "${ALPACA_API_KEY}"  # Set this environment variable or replace with your key
    secret_key: "${ALPACA_SECRET_KEY}"  # Set this environment variable or replace with your secret
    base_url: "https://paper-api.alpaca.markets"  # Paper trading (change to live when ready)
  
# Database Configuration
database:
  path: "trading_bot.db"
  backup_enabled: true
  backup_interval_hours: 24

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file_enabled: true
  file_path: "logs/trading_bot.log"
  console_enabled: true
  max_file_size_mb: 10
  backup_count: 5

# Server Configuration (FastAPI/Uvicorn)
server:
  host: "0.0.0.0"  # Listen on all interfaces
  port: 8080
  workers: 1

# Webhook Configuration
webhook:
  enabled: true
  path: "/webhook"  # The webhook endpoint path
  host: "localhost"  # Host for webhook URLs
  port: 8080  # Port for webhook URLs
  
  # Security settings
  security:
    security_enabled: false  # Enable/disable webhook security (set to true for production)
    secret: ""  # Webhook secret for signature verification (required when security_enabled is true)
    # Generate a strong secret: openssl rand -hex 32

# ngrok Configuration (DISABLED for local-only mode)
ngrok:
  enabled: false  # ngrok tunnel disabled - local mode only
  auth_token: ""  # Not needed when disabled

# Trading Configuration
trading:
  # Position sizing
  default_quantity: 100  # Default number of shares to trade
  max_position_size: 1000  # Maximum position size per symbol
  max_daily_trades: 50  # Maximum number of trades per day
  
  # Risk management
  max_portfolio_risk: 0.02  # Maximum 2% portfolio risk per trade
  stop_loss_percent: 0.05  # Default 5% stop loss
  max_drawdown_percent: 0.10  # Maximum 10% portfolio drawdown

# Trading Strategy Configuration
strategies:
  support_averaging:
    enabled: true
    max_positions: 3  # Maximum number of averaging down positions
    position_increment: 1.5  # Multiplier for each additional position
    price_drop_threshold: 0.02  # 2% price drop to trigger averaging down
    
  trailing_profit:
    enabled: true
    default_trailing_percent: 0.03  # 3% trailing stop
    min_profit_threshold: 0.05  # Minimum 5% profit before trailing starts

# Position Management
positions:
  auto_close_enabled: true
  profit_target_percent: 0.10  # 10% profit target
  time_based_exit_hours: 24  # Close positions after 24 hours
  weekend_close_enabled: true  # Close all positions before weekends

# Risk Management
risk:
  enabled: true
  max_position_value: 10000  # Maximum $10,000 per position
  max_daily_loss: 500  # Maximum $500 daily loss
  max_open_positions: 5  # Maximum 5 open positions
  
  # Portfolio limits
  max_sector_exposure: 0.30  # Maximum 30% exposure to any sector
  max_single_stock_exposure: 0.20  # Maximum 20% exposure to any single stock

# Market Data Configuration  
market_data:
  provider: "alpaca"  # Data source
  subscription: "basic"  # basic, premium
  realtime_enabled: true
  
# Development Settings
development:
  admin_shutdown_enabled: true  # Enable /admin/shutdown endpoint
  auto_shutdown_enabled: false  # Auto-shutdown on errors
  mock_trading_enabled: false  # Enable for testing without real trades
