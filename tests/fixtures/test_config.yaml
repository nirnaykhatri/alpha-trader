# Test configuration for trading bot tests

api:
  alpaca:
    api_key: "test_api_key_12345"
    secret_key: "test_secret_key_67890"
    base_url: "https://paper-api.alpaca.markets"
    timeout: 30
    max_retries: 3
    retry_delay: 1.0

  webhook:
    host: "127.0.0.1"
    port: 8080
    secret: "test_webhook_secret_abcdef123456"

trading:
  default_quantity: 100
  max_position_size: 1000
  max_daily_trades: 50
  risk_per_trade: 0.02
  max_portfolio_risk: 0.10
  order_timeout_minutes: 5
  use_market_orders: false
  limit_order_offset: 0.001

strategies:
  averaging_down:
    enabled: true
    max_attempts: 3
    step_percentage: 0.02
    timeframe: "1h"
    min_gap_percentage: 0.01
    
  trailing_profit:
    enabled: true
    initial_trail_percent: 0.05
    trail_step_percent: 0.01
    min_profit_percent: 0.02
    max_trail_percent: 0.15
    trail_adjustment_threshold: 0.03

database:
  url: "sqlite:///test_trading_bot.db"
  echo: false

logging:
  level: "DEBUG"
  file: "test_trading_bot.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  max_file_size: 10485760
  backup_count: 5
