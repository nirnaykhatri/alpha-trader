# Configuration options for enhanced support/resistance logging
# Add these sections to your config.yaml file to customize the behavior

technical_analysis:
  support:
    # Cache settings
    cache_duration_minutes: 15        # How long to cache calculated levels (minutes)
    max_cache_size: 100              # Maximum number of cached symbols
    
    # Calculation settings  
    lookback_periods: 50             # Number of historical bars to analyze
    min_confidence: 0.7              # Minimum confidence for levels (0.0-1.0)
    min_valid_price: 0.01            # Minimum price to avoid division by zero
    
    # Calculation method toggles
    calculation_methods:
      pivot_points: true             # Enable pivot point calculations
      moving_averages: true          # Enable moving average support/resistance
      volume_profile: true           # Enable volume profile analysis
      fibonacci_retracements: true   # Enable Fibonacci retracement levels
      fibonacci_extensions: true     # Enable Fibonacci extension levels

  resistance:
    min_confidence: 0.7              # Minimum confidence for resistance levels
    calculation_methods:
      pivot_points: true
      moving_averages: true
      volume_profile: true
      fibonacci_extensions: true

# Logging display settings
logging:
  price_precision: 2                 # Decimal places for price display ($42.11)
  percentage_precision: 1            # Decimal places for percentage display (2.1%)

# DCA Strategy settings (related to support/resistance usage)
strategies:
  dca:
    min_support_confidence: 0.70     # Min confidence for support-based DCA
    min_resistance_confidence: 0.70  # Min confidence for resistance-based DCA
    support_buffer_percent: 0.005    # Buffer below support level (0.5%)
    resistance_buffer_percent: 0.005 # Buffer above resistance level (0.5%)
