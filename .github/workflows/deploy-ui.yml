# CI/CD Pipeline for Trading Terminal UI Deployment to Azure Static Web Apps
#
# Triggers:
#   - Push to main branch (trading-terminal code changes)
#   - Manual workflow dispatch
#
# What it does:
#   1. Installs dependencies
#   2. Builds Next.js static export
#   3. Deploys to Azure Static Web Apps
#
# Required secrets:
#   - AZURE_STATIC_WEB_APPS_API_TOKEN: Deployment token from Azure portal

name: Deploy Trading Terminal UI

on:
  push:
    branches:
      - main
    paths:
      - 'trading-terminal/**'
      - '.github/workflows/deploy-ui.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'trading-terminal/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - live

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: 'trading-terminal'

jobs:
  # ============================================================================
  # Build and Deploy Job
  # ============================================================================
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIRECTORY }}/package-lock.json'
      
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci
      
      - name: Run linting
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run lint
      
      - name: Run type check
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run type-check
      
      - name: Build application
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run build
        env:
          # Pass environment-specific API URLs
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}
          NEXT_PUBLIC_SIGNALR_URL: ${{ vars.SIGNALR_URL }}
          NEXT_PUBLIC_ENVIRONMENT: ${{ github.event.inputs.environment || 'demo' }}
      
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '${{ env.WORKING_DIRECTORY }}'
          output_location: 'out'
          skip_app_build: true  # We already built above
      
      - name: Deployment Summary
        run: |
          echo "### UI Deployment Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'demo' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Node Version:** ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Trading Terminal UI has been deployed to Azure Static Web Apps." >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Close PR Job - Clean up preview environment
  # ============================================================================
  close_pull_request:
    name: Close Pull Request
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
